version: "3.9"

services:
  expense-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/expenses.db
      - PORT=3001
      - FRONTEND_URL
      - GOOGLE_CLIENT_ID
      - GOOGLE_CLIENT_SECRET
      - GOOGLE_REDIRECT_URI
      - AUTHORIZED_GOOGLE_USER_ID
      - JWT_SECRET
      - R2_BACKUP_ENABLED
      - R2_ACCOUNT_ID
      - R2_ACCESS_KEY_ID
      - R2_SECRET_ACCESS_KEY
      - R2_BUCKET_NAME
      - R2_ENDPOINT
    volumes:
      - db-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - default
      - dokploy-network

  expense-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - expense-backend
    networks:
      - default
      - dokploy-network

volumes:
  db-data:

networks:
  dokploy-network:
    external: true
