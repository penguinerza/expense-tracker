name: Deploy expense-tracker

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, expense-tracker]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure data directory
        run: mkdir -p /expense-tracker/data

      - name: Write .env
        run: |
          cat > /expense-tracker/.env <<'EOF'
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI=${{ secrets.GOOGLE_REDIRECT_URI }}
          AUTHORIZED_GOOGLE_USER_ID=${{ secrets.AUTHORIZED_GOOGLE_USER_ID }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          COOKIE_DOMAIN=${{ secrets.COOKIE_DOMAIN }}
          R2_ACCOUNT_ID=${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME=${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT=${{ secrets.R2_ENDPOINT }}
          PORT=3001
          NODE_ENV=production
          FRONTEND_URL=${{ secrets.FRONTEND_URL }}
          EOF

      - name: Deploy backend
        run: |
          docker build --no-cache -t expense-tracker-backend ./backend
          docker stop backend || true
          docker rm backend || true
          docker run -d \
            --name backend \
            --network proxy \
            --restart unless-stopped \
            -v expense-tracker-db:/app/data \
            --env-file /expense-tracker/.env \
            expense-tracker-backend

      - name: Deploy frontend
        run: |
          docker build --no-cache -t expense-tracker-frontend ./frontend
          docker stop frontend || true
          docker rm frontend || true
          docker run -d \
            --name frontend \
            --network proxy \
            --restart unless-stopped \
            expense-tracker-frontend

